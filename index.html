<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✍️</text></svg>">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <title>Etch-a-Sketch</title>
</head>
<body>
    
    <div class="title">
        <span>E</span>
        <span>T</span>
        <span>C</span>
        <span>H</span>
        <span>|</span>
        <span>A</span>
    </div>
    <div id="main">
        <button id="clear-grid">Clear Grid</button>
        <div id="button-container">
            <button data-type ="color" class="color-button" style="background-color:#e8eaed;" data-color="#e8eaed"></button>
            <button data-type ="color" class="color-button" style="background-color:#8ab4f8;" data-color="#8ab4f8"></button>
            <button data-type ="color" class="color-button" style="background-color:#ff6b6b;" data-color="#ff6b6b"></button>
            <button data-type ="color" class="color-button" style="background-color:#6bcf63;" data-color="#6bcf63"></button>
            <button data-type ="color" class="color-button" style="background-color:#ffd166;" data-color="#ffd166"></button>
            <button id="random-color-button">Random</button>
            <button data-type ="custom-grid" id="custom-grid-button">Enter Custom Grid</button>
            <button data-type ="grid" data-grid="7">7x7</button>
            <button data-type ="grid" data-grid="8">8x8</button>
            <button data-type ="grid" data-grid="10">10x10</button>
            <button data-type ="grid" data-grid="25">25x25</button>
        </div>
        <div id="container" class="container"></div>
        <button id="toggle-grid-line" data-property="outline = 1px dashed rgba(128, 128, 128, 20%);">Toggle Grid Line</button>
    </div>
    <div class="title">
        <span>S</span>
        <span>K</span>
        <span>E</span>
        <span>T</span>
        <span>C</span>
        <span>H</span>
    </div>
</body>
</html>
